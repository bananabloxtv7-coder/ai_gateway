<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Gateway — لوحة التحكم</title>
  <script
    src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.0/dist/index.global.js"
    integrity="sha384-nWTzRTCY/9V4Bo352ehygr1c4cnst4XN6lMR3fipakEQrhVpc0hEM5Dii3Amz0sT"
    crossorigin="anonymous"
  ></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
  </style>
  <script>
    document.documentElement.classList.toggle(
      'dark',
      window.matchMedia('(prefers-color-scheme: dark)').matches
    );
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-dvh text-sm antialiased bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100">
  <div id="app" class="mx-auto w-full max-w-6xl p-4 sm:p-6">

    <!-- Header -->
    <header class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex items-center gap-3">
        <div class="grid h-11 w-11 place-items-center rounded-xl bg-emerald-500 text-white font-bold text-lg shadow">AG</div>
        <div>
          <h1 class="text-lg font-bold leading-tight">AI Gateway</h1>
          <p class="text-xs text-gray-500 dark:text-gray-400">مفتاح واحد ⇦ عشرات النماذج · تدوير المفاتيح + failover</p>
        </div>
      </div>
      <div id="conn-badge" class="inline-flex items-center gap-2 self-start rounded-full border border-gray-300 px-3 py-1 text-xs dark:border-gray-700">
        <span class="h-2 w-2 rounded-full bg-gray-400"></span> غير متصل
      </div>
    </header>

    <!-- Connection -->
    <section class="mb-6 rounded-2xl border border-gray-200 bg-white p-4 shadow-sm dark:border-gray-800 dark:bg-gray-900">
      <h2 class="mb-3 font-semibold">الاتصال بالبوابة</h2>
      <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
        <label class="flex flex-col gap-1">
          <span class="text-xs text-gray-500 dark:text-gray-400">عنوان البوابة (Base URL)</span>
          <input id="baseUrl" value="http://localhost:8080" class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 outline-none focus:border-emerald-500 dark:border-gray-700 dark:bg-gray-950" dir="ltr">
        </label>
        <label class="flex flex-col gap-1">
          <span class="text-xs text-gray-500 dark:text-gray-400">مفتاح البوابة (اختياري)</span>
          <input id="gwKey" placeholder="my-secret-gateway-key" class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 outline-none focus:border-emerald-500 dark:border-gray-700 dark:bg-gray-950" dir="ltr">
        </label>
      </div>
      <div class="mt-3 flex flex-wrap gap-2">
        <button id="connectBtn" class="rounded-lg bg-emerald-600 px-4 py-2 font-medium text-white hover:bg-emerald-700">اتصال وتحميل النماذج</button>
        <button id="refreshStats" class="rounded-lg border border-gray-300 px-4 py-2 font-medium hover:bg-gray-100 dark:border-gray-700 dark:hover:bg-gray-800">تحديث الإحصائيات</button>
      </div>
      <p id="conn-msg" class="mt-2 text-xs text-gray-500 dark:text-gray-400"></p>
    </section>

    <div class="grid grid-cols-1 gap-6 md:grid-cols-5">
      <!-- Chat playground -->
      <section class="md:col-span-3 rounded-2xl border border-gray-200 bg-white p-4 shadow-sm dark:border-gray-800 dark:bg-gray-900">
        <div class="mb-3 flex items-center justify-between gap-2">
          <h2 class="font-semibold">مختبر الشات</h2>
          <select id="modelSelect" class="max-w-[60%] rounded-lg border border-gray-300 bg-white px-2 py-1.5 text-xs outline-none focus:border-emerald-500 dark:border-gray-700 dark:bg-gray-950" dir="ltr">
            <option value="">— اختر نموذجاً —</option>
          </select>
        </div>
        <div id="chat" class="mb-3 flex h-80 flex-col gap-3 overflow-y-auto rounded-xl bg-gray-50 p-3 dark:bg-gray-950"></div>
        <div class="flex items-end gap-2">
          <textarea id="prompt" rows="2" placeholder="اكتب رسالتك…" class="w-full resize-none rounded-lg border border-gray-300 bg-white px-3 py-2 outline-none focus:border-emerald-500 dark:border-gray-700 dark:bg-gray-950"></textarea>
          <button id="sendBtn" class="shrink-0 rounded-lg bg-emerald-600 px-4 py-2.5 font-medium text-white hover:bg-emerald-700 disabled:opacity-50">إرسال</button>
        </div>
        <label class="mt-2 inline-flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400">
          <input id="streamToggle" type="checkbox" checked class="accent-emerald-600"> بث مباشر (streaming)
        </label>
      </section>

      <!-- Stats -->
      <section class="md:col-span-2 rounded-2xl border border-gray-200 bg-white p-4 shadow-sm dark:border-gray-800 dark:bg-gray-900">
        <h2 class="mb-3 font-semibold">مجمّع المفاتيح والإحصائيات</h2>
        <div id="stats" class="flex flex-col gap-3">
          <p class="text-xs text-gray-500 dark:text-gray-400">اتصل بالبوابة لعرض المزوّدين والمفاتيح.</p>
        </div>
      </section>
    </div>

    <footer class="mt-6 text-center text-xs text-gray-400">
      AI Gateway · نسخة تعليمية — استخدم مفاتيحك الخاصة فقط والتزم بشروط كل مزوّد.
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
